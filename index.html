<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Finder | Open Library</title>
  <meta name="description" content="Discover books, authors, and trending titles using the Open Library API.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="glass-header">
      <div class="logo">
        <h1>Book Finder</h1>
      </div>
    <nav class="app-nav">
    <button id="nav-home" class="nav-btn active">Search</button>
    <button id="nav-reading-list" class="nav-btn">Reading List</button>

    <!-- Login Button -->
   <button id="login-btn">
        Sign in with Google
    </button>

    <!-- User Info (shown when logged in) -->
   <div id="user-info" style="display:none; align-items:center; gap:8px;">
    <img id="user-photo" width="32" height="32" style="border-radius:50%;">
    <span id="user-name"></span>
    <button id="logout-btn">Sign Out</button>  ← remove the onclick
</div>
</nav>
      <form id="search-form" class="search-bar">
        <select id="search-type" aria-label="Search Type">
          <option value="q">All</option>
          <option value="title">Title</option>
          <option value="author">Author</option>
          <option value="subject">Subject</option>
          <option value="isbn">ISBN</option>
        </select>
        <input type="text" id="search-input" placeholder="Search for books..." required aria-label="Search Input">
        <button type="submit" id="search-btn">Search</button>
      </form>
    </header>

    <main>
      <section id="trending-section" class="section">
        <h2>Trending Now</h2>
        <div id="trending-grid" class="book-grid">
          <div class="loader">Loading...</div>
        </div>
      </section>

      <section id="results-section" class="section hidden">
        <h2>Search Results <span id="results-count"></span></h2>
        <div id="results-grid" class="book-grid"></div>
        <button id="load-more-btn" class="hidden">Load More</button>
      </section>

      <section id="reading-list-section" class="section hidden">
        <div class="section-header">
          <h2>My Reading List</h2>
          <select id="reading-list-filter" class="filter-dropdown" aria-label="Filter reading list">
            <option value="all">All</option>
            <option value="Want to Read">Want to Read</option>
            <option value="Read">Read</option>
          </select>
        </div>
        <div id="reading-list-grid" class="book-grid"></div>
      </section>
    </main>
  </div>
  <script type="module" src="app.js"></script>
 <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
   const firebaseConfig = {
  apiKey: "AIzaSyDAVBQqdd9xab6XI_BcUZf0HAAbaFTOfEo",
  authDomain: "book-finder-6216c.firebaseapp.com",
  projectId: "book-finder-6216c",
  storageBucket: "book-finder-6216c.firebasestorage.app",
  messagingSenderId: "1024236519044",
  appId: "1:1024236519044:web:59cd51d7e100e3ecf64cd1"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  async function signInWithGoogle() {
    try {
      const result = await signInWithPopup(auth, provider);
      console.log("Signed in:", result.user.displayName);
    } catch (error) {
      console.error("Error:", error.message);
    }
  }

  async function signOutUser() {
    await signOut(auth);
  }

  // ✅ This is the fix — attach clicks inside the module
  document.getElementById("login-btn").addEventListener("click", signInWithGoogle);
  document.getElementById("logout-btn").addEventListener("click", signOutUser);

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("user-name").textContent = user.displayName;
      document.getElementById("user-photo").src = user.photoURL;
      document.getElementById("login-btn").style.display = "none";
      document.getElementById("logout-btn").style.display = "block";
      document.getElementById("user-info").style.display = "flex";
    } else {
      document.getElementById("login-btn").style.display = "block";
      document.getElementById("logout-btn").style.display = "none";
      document.getElementById("user-info").style.display = "none";
    }
  });
</script>
</body>
</html>
