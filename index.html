<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Finder | Open Library</title>
  <meta name="description" content="Discover books, authors, and trending titles using the Open Library API.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="glass-header">
      <div class="logo">
        <h1>Book Finder</h1>
      </div>
      <nav class="app-nav">
        <button id="nav-home" class="nav-btn active">Search</button>
        <button id="nav-reading-list" class="nav-btn">Reading List</button>
      </nav>
      <form id="search-form" class="search-bar">
        <select id="search-type" aria-label="Search Type">
          <option value="q">All</option>
          <option value="title">Title</option>
          <option value="author">Author</option>
          <option value="subject">Subject</option>
          <option value="isbn">ISBN</option>
        </select>
        <input type="text" id="search-input" placeholder="Search for books..." required aria-label="Search Input">
        <button type="submit" id="search-btn">Search</button>
      </form>
    </header>

    <main>
      <section id="trending-section" class="section">
        <h2>Trending Now</h2>
        <div id="trending-grid" class="book-grid">
          <div class="loader">Loading...</div>
        </div>
      </section>

      <section id="results-section" class="section hidden">
        <h2>Search Results <span id="results-count"></span></h2>
        <div id="results-grid" class="book-grid"></div>
        <button id="load-more-btn" class="hidden">Load More</button>
      </section>

      <section id="reading-list-section" class="section hidden">
        <div class="section-header">
          <h2>My Reading List</h2>
          <select id="reading-list-filter" class="filter-dropdown" aria-label="Filter reading list">
            <option value="all">All</option>
            <option value="Want to Read">Want to Read</option>
            <option value="Read">Read</option>
          </select>
        </div>
        <div id="reading-list-grid" class="book-grid"></div>
      </section>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
